<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

  <link rel="stylesheet" type="text/css" href=" ../css/login.css?v=1.0.2"> 
  <title>ArtVoyage</title>
  <link rel="icon" href="../image/artIcon.jpg" type="image/icon type">
</head>
<body>

  <div>
    <button class="HomeButton" type="button" id="navigateButton"></button>
  </div>
  
    <div class="center-container">
      <img src="../image/artIcon.jpg" alt="icon Image">
      <h2>Sign up / Log In</h2>
    </div> 

    <div class="container">


    <!-- Three Dots Menu &#8230; -->
    <div class="dots-menu" onclick="toggleMenu()">&#9776;</div>

   
    <form id="emailForm" action="/auth/send-otp" method="POST">
      <br>
      <h3>Enter your email to receive OTP</h3>
      <label for="email">Email Address:</label>
      <br>
      <input type="email" id="email" name="email" required />
      <br>
      <button type="submit" id="emailButton">Send OTP</button>
    </form>

    

    <!-- Menu Card -->
    <div class="menu-card" id="menuCard">
      <!-- Close Button -->
      <div class="close-btn" onclick="toggleMenu()">&#10005;</div>
      <!-- <a href="javascript:void(0)" id="forgotPasswordLink">Forgot Password</a> -->
      <a href="javascript:void(0)" id="contactSupportLink">Contact Support</a>
      <a href="javascript:void(0)" id="loginLink">Log In</a>
    </div>

    <!-- OTP Input (Initially Hidden) -->
    <div id="otpBox">
      <h2>Enter the OTP you received</h2>
      <form id="otpForm" action="/auth/verify-otp" method="POST">
        <label for="otp">OTP:</label>
        <input type="text" id="otp" name="otp" required />
        <button type="submit" id="VerifyButton">Verify OTP</button>
      </form>
    </div>

    <!-- Password Input (Initially Hidden) -->
    <div id="passwordBox">
      <h2>Enter your new password</h2>
      <form id="passwordForm" action="/auth/set-password" method="POST">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required />
        <label for="confirmPassword">Confirm Password:</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required />
        <button type="submit" id="passwordButton">Set Password</button>
      </form>
    </div>

    <!-- Login Form (Initially Hidden)-->
    <div id="loginBox">
      <h2>Already registered!! Please log in</h2>
      <form id="loginForm">
        <label for="loginEmail">Email Address:</label>
        <input type="email" id="loginEmail" name="email" required />
        <label for="loginPassword">Password:</label>
        <input type="password" id="loginPassword" name="password" required />
        <button type="submit" id="loginButton">Login</button>
      </form>
      <p><a href="javascript:void(0)" id="forgotPasswordLoginBoxLink">Forgot Password?</a></p>
    </div>
  </div>

  <div class="copyright">
    &copy; 2024 ASUS SHRUTIPRIYA3064. All Rights Reserved.
  </div>

  <script src="../js/login.js?v=1.0.3">
    

  </script>

</body>
</html>
